name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * *' # Run every day at 00:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render Backend and Ping Database
        run: |
          echo "Pinging Render backend health check to wake up the service..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "https://unimaintain-backend.onrender.com/api/health")
          
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "Success! Render backend responded with status code $HTTP_STATUS and triggered database activity."
          else
            echo "Warning: Failed to ping Render backend. Received status code $HTTP_STATUS."
          fi

      - name: Ping Supabase REST API (Optional)
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Warning: NEXT_PUBLIC_SUPABASE_URL or NEXT_PUBLIC_SUPABASE_ANON_KEY is not set in GitHub Secrets."
            echo "Skipping direct Supabase REST API ping. (Database is still kept alive via the Render backend ping!)"
            exit 0
          fi

          echo "Pinging Supabase REST API directly..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$SUPABASE_URL/rest/v1/users?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "Success! Supabase REST API responded with status code $HTTP_STATUS."
          else
            echo "Failed to ping Supabase REST API. Received status code $HTTP_STATUS."
            exit 1
          fi
