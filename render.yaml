services:
  - type: web
    name: unimaintain-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: API_URL
        value: https://unimaintain-backend.onrender.com
